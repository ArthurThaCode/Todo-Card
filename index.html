<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Todo Card</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<article data-testid="test-todo-card">

  <h2 data-testid="test-todo-title">Learn Frontend</h2>

  <p data-testid="test-todo-description">
    Create an interactive Todo Card for testing.
  </p>

  <span data-testid="test-todo-priority">High</span>

  <time data-testid="test-todo-due-date" datetime="2026-04-20">
    Due Apr 20, 2026
  </time>

  <p data-testid="test-todo-time-remaining">
    Calculating...
  </p>

  <span data-testid="test-todo-status">In Progress</span>

  <label>
    <input type="checkbox" data-testid="test-todo-complete-toggle">
    Completed
  </label>

  <ul data-testid="test-todo-tags">
    <li data-testid="test-todo-tag-frontend">frontend</li>
    <li data-testid="test-todo-tag-learning">learning</li>
  </ul>

  <button data-testid="test-todo-edit-button">Edit</button>
  <button data-testid="test-todo-delete-button">Delete</button>

</article>

<script src="index.js"></script>
</body>
</html>
